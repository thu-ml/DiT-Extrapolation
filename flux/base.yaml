method:
  guidance_schedule: standard
  proportional_attention: true
  text_duplication: False
  time_shift_2: 6
  sdedit_threshold: 11
  start_croords: [0.5, 0.5]
  inner_ratio: 1.0
  hyper_parameters_height:
    freq_id: [9]
    linear_factor: 1.0 # automatically compute
    ntk_factor: 1
    train_length: 1024 # automatically compute
    length: 225
    riflex_scale: 0.85
  hyper_parameters_width:
    freq_id: [9]
    linear_factor: 1.0 # automatically compute
    ntk_factor: 1 
    train_length: 1024 # automatically compute
    length: 225
    riflex_scale: 0.85
  name_height: riflex
  name_width: riflex
  attention_operator:
    attn_func: attention_decay
    disable_uncond: false
    ref_name: uniform
    save_one_timestep: true
    use_block_bias: false
    use_decay_mask: true
    decay_type: continuous
    h_min: 0.04
    h_max: 6.25
    lambda_max: 1.3
    lambda_min: 1.0
    func_type: power
    gamma: 2.0
  save_dir: / # your path for block avg

base:
  train_resolution: [1024, 1024]
  resolution: [3600, 3600]
  model_path: /  # your Flux model path 
  output_dir: / # your path for output
  prompts_low: / # your prompts for low resolution
  prompts_high: / # your prompts for high resolution
  seed: 42
